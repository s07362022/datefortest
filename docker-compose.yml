version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: datingapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: datingapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datingapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
